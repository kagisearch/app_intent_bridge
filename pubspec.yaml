name: app_intent_bridge
description: A Flutter plugin that bridges iOS App Intents to Dart via MethodChannel.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: AppIntentBridgePlugin
